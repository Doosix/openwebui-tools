version: "3.9"

services:
  openwebui-tools:
    build: .
    container_name: openwebui-tools
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
